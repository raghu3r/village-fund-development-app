<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Moolam మూలం</title>
    <meta name="description" content="Far from home. Never from roots. — Reddy Community Fund" />
    <meta name="author"      content="Moolam" />

    <!-- PWA / Theme -->
    <meta name="theme-color"                              content="#1b4332" />
    <meta name="mobile-web-app-capable"                   content="yes" />
    <meta name="apple-mobile-web-app-capable"             content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"    content="black-translucent" />
    <meta name="apple-mobile-web-app-title"               content="Moolam" />
    <meta name="msapplication-TileColor"                  content="#1b4332" />

    <!-- Icons -->
    <link rel="icon"             type="image/png" sizes="32x32"  href="/icon-32.png" />
    <link rel="icon"             type="image/png" sizes="16x16"  href="/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180"                 href="/icon-180.png" />
    <link rel="manifest"         href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Moolam — మూలం" />
    <meta property="og:description" content="Far from home. Never from roots." />
    <meta property="og:image"       content="/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Splash bg while JS loads -->
    <style>
      html, body { margin: 0; padding: 0; background: #1b4332; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r  => console.log('Moolam SW:', r.scope))
            .catch(e => console.warn('SW failed:', e));
        });
      }
    </script>
  </body>
</html>
